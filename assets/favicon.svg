<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- App icon rounded square background -->
  <rect width="200" height="200" rx="44" fill="#080e1a"/>

  <!-- Camera body -->
  <rect x="14" y="58" width="172" height="112" rx="18" fill="#0d1525" stroke="rgba(14,165,233,0.5)" stroke-width="3"/>

  <!-- Viewfinder bump top-left -->
  <rect x="22" y="42" width="58" height="26" rx="9" fill="#0d1525" stroke="rgba(14,165,233,0.5)" stroke-width="3"/>

  <!-- Status LED top-right -->
  <circle cx="164" cy="55" r="7" fill="#0ea5e9"/>

  <!-- GPS pin = the lens -->
  <!-- Pin circle head -->
  <circle cx="104" cy="106" r="38" fill="#0ea5e9"/>
  <!-- Pin tip poking below camera body (implies location/GPS) -->
  <path d="M 70,124 L 138,124 L 104,176 Z" fill="#0ea5e9"/>

  <!-- Lens dark inner circle -->
  <circle cx="104" cy="106" r="25" fill="#080e1a"/>

  <!-- Lens aperture ring -->
  <circle cx="104" cy="106" r="17" fill="none" stroke="rgba(14,165,233,0.6)" stroke-width="2.5"/>

  <!-- Center focus dot -->
  <circle cx="104" cy="106" r="7" fill="#0ea5e9"/>
  <circle cx="104" cy="106" r="3" fill="white"/>
</svg>
